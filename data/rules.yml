version: "3.1"

rules:
  - rule: Envoyer le message de bienvenue au démarrage de la session
    steps:
      - action: action_session_start
      - action: utter_saluer
      
  - rule: Afficher services
    steps:
      - intent: demander_services
      - action: utter_services

  - rule: Demander prix
    steps:
      - intent: demander_prix
      - action: utter_prix

  - rule: Commander un chatbot
    steps:
      - intent: demander_chatbot
      - action: utter_demander_chatbot

  - rule: Au revoir
    steps:
      - intent: au_revoir
      - action: utter_au_revoir

  - rule: Nous contacter
    steps:
      - intent: nous_contacter
      - action: utter_nous_contacter

  - rule: Prendre rendez-vous
    steps:
      - intent: prendre_rendez_vous
      - action: utter_prendre_rendez_vous

  - rule: demander les fonctionnalites
    steps:
      - intent: demander_fonctionnalites
      - action: utter_demander_fonctionnalites

  - rule: demander le support client
    steps:
      - intent: demander_support
      - action: utter_demander_support

  - rule: Répondre à un utilisateur heureux
    steps:
      - intent: heureux
      - action: utter_heureux


  - rule: Répondre à une demande de démo
    steps:
    - intent: demander_demo
    - action: utter_demo

  - rule: Répondre à une demande de délai
    steps:
    - intent: demander_delai
    - action: utter_delai

  - rule: Répondre à une demande d'intégration WhatsApp
    steps:
    - intent: demander_integration_whatsapp
    - action: utter_integration_whatsapp

  - rule: Répondre à une demande d'intégration site web
    steps:
    - intent: demander_integration_site
    - action: utter_integration_site

  - rule: Répondre aux remerciements
    steps:
    - intent: remercier
    - action: utter_remercier

  - rule: demander à l'utilisateur s'il a une autre question
    steps:
    - intent: utter_autres_questions
    - action: utter_autres_questions

  - rule: demander à l'utilisateur s'il n'a plus une autre question
    steps:
    - intent: question_termine
    - action: utter_question_termine