services:
  - type: web
    name: mon-chatbot
    env: python
    plan: free
    region: oregon  # ou ton choix
    buildCommand: |
      python3 -m pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: |
      rasa run --enable-api --cors "*" --port 5005 --host 0.0.0.0

  - key: PYTHON_VERSION
    value: 3.9.18