          payload: "/demander_services"
        - title: "💰 Voir les prix"
          payload: "/demander_prix"
        - title: "🎥 Voir une démo"
          payload: "/demander_demo"
        - title: "📞 Contacter un conseiller"
          payload: "/nous_contacter"


  utter_autres_questions:
    - text: |
        Bien sûr 😊

        Je vous écoute.  
        Quelle est votre question ?


  utter_question_termine:
    - text: |
        Parfait 😊

        Si vous avez d'autres questions à l’avenir concernant **les chatbots ou l’automatisation**, n’hésitez pas à revenir vers nous.

        Passez une excellente journée 👋